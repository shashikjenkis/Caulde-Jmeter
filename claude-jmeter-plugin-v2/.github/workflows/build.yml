name: Build and Release JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from GitHub UI with one click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 11 (Maven runs on Java)
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven          # caches Maven deps so future builds are faster

      # 3. Build the fat JAR (Maven is pre-installed on GitHub's runners)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Upload the JAR as a build artifact
      #    Go to: Actions tab → your workflow run → download from "Artifacts"
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-jmeter-plugin
          path: target/claude-jmeter-plugin-all.jar
          retention-days: 30

      # 5. Also create a GitHub Release with the JAR attached
      #    (only runs when you push to main)
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Claude JMeter Plugin — Build ${{ github.run_number }}"
          body: |
            Auto-built from commit ${{ github.sha }}
            
            ## Install
            1. Download `claude-jmeter-plugin-all.jar` below
            2. Copy to your JMeter `lib/ext/` folder
            3. Restart JMeter
            4. Go to **Tools → Claude AI Assistant**
          files: target/claude-jmeter-plugin-all.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
